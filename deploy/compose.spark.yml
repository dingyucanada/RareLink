# Competition demo stack. Raw data and artifacts stay in the local checkout.
# `network_mode: host` intentionally uses the organiser's allocated port mapping.
services:
  api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.spark
    image: rarelink-spark:review
    network_mode: host
    working_dir: /workspace
    volumes:
      - ../:/workspace
    environment:
      APP_ENV: competition-demo
      RARELINK_FL_MODE: nvflare
      # The TensorRT-LLM server is intentionally started separately on Spark.
      # It is never pulled automatically with the review demo stack.
      RARELINK_AGENT_BACKEND: ${RARELINK_AGENT_BACKEND:-hybrid}
      RARELINK_SPARK_LLM_BASE: ${RARELINK_SPARK_LLM_BASE:-http://127.0.0.1:8355/v1}
      SPARK_LLM_MODEL: ${SPARK_LLM_MODEL:-nvidia/NVIDIA-Nemotron-3-Super-120B-A12B-NVFP4}
      CORS_ORIGINS: http://127.0.0.1:8888,http://localhost:8888
    command:
      - sh
      - -c
      - python3 scripts/seed_competition_evidence.py --target artifacts && exec python3 -m uvicorn rarelink.api.main:app --host 0.0.0.0 --port 9000
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  web:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.web
    image: rarelink-web:review
    network_mode: host
    environment:
      RARELINK_API_PROXY: http://127.0.0.1:9000
    depends_on:
      - api
