<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="740" viewBox="0 0 1400 740" role="img" aria-labelledby="title desc">
  <title id="title">RareLink engineering evidence scorecard</title>
  <desc id="desc">A bright evidence scorecard showing completed repeated experiments, agent safety checks, differential privacy accounting, two-device mTLS rehearsal, and a comparison of worst-site Dice across five synthetic federated-learning strategies.</desc>
  <defs>
    <filter id="shadow" x="-10%" y="-15%" width="120%" height="140%"><feDropShadow dx="0" dy="10" stdDeviation="13" flood-color="#0f172a" flood-opacity=".12"/></filter>
    <style>
      .title{font:800 38px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#10243e}.sub{font:500 18px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#52657c}.kicker{font:800 14px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;letter-spacing:1.5px;fill:#16855b}.metric{font:800 38px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#10243e}.metricWide{font:800 31px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#10243e}.label{font:700 16px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#25425f}.body{font:500 14px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#61758c}.chartTitle{font:800 24px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#10243e}.tick{font:600 13px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#6b7f95}.barLabel{font:700 14px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#27415b}.barValue{font:800 15px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#10243e}.note{font:600 14px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#50677e}
    </style>
  </defs>
  <rect width="1400" height="740" rx="28" fill="#f7fafc"/>
  <rect x="0" y="0" width="18" height="740" rx="9" fill="#76b900"/>
  <text x="70" y="66" class="kicker">RARELINK · EVIDENCE, NOT PROMISES</text>
  <text x="70" y="113" class="title">A federated research system that shows its receipts</text>
  <text x="70" y="146" class="sub">Spark-local compute · policy-filtered agents · reproducible engineering evidence</text>

  <g filter="url(#shadow)">
    <rect x="70" y="188" width="285" height="145" rx="18" fill="#ffffff" stroke="#d9e5ed"/>
    <rect x="375" y="188" width="285" height="145" rx="18" fill="#ffffff" stroke="#d9e5ed"/>
    <rect x="680" y="188" width="285" height="145" rx="18" fill="#ffffff" stroke="#d9e5ed"/>
    <rect x="985" y="188" width="345" height="145" rx="18" fill="#ffffff" stroke="#d9e5ed"/>
  </g>
  <rect x="70" y="188" width="7" height="145" rx="3.5" fill="#0ea5e9"/>
  <text x="100" y="226" class="metric">25 / 25</text><text x="100" y="257" class="label">strategy–seed runs complete</text><text x="100" y="287" class="body">5 seeds × 5 strategies × 3 rounds</text>
  <rect x="375" y="188" width="7" height="145" rx="3.5" fill="#8b5cf6"/>
  <text x="405" y="226" class="metric">26 / 26</text><text x="405" y="257" class="label">agent safety cases passed</text><text x="405" y="287" class="body">attack + safe-control test suite</text>
  <rect x="680" y="188" width="7" height="145" rx="3.5" fill="#f59e0b"/>
  <text x="710" y="226" class="metricWide">ε = 6.076881</text><text x="710" y="257" class="label">sample-level DP-SGD</text><text x="710" y="287" class="body">3 rounds · δ = 1e-5 · conservative RDP</text>
  <rect x="985" y="188" width="7" height="145" rx="3.5" fill="#76b900"/>
  <text x="1015" y="226" class="metric">mTLS</text><text x="1015" y="257" class="label">Spark–Mac rehearsal</text><text x="1015" y="287" class="body">registration · reconnect · wrong identity rejected</text>

  <rect x="70" y="374" width="1260" height="306" rx="20" fill="#ffffff" stroke="#d9e5ed" filter="url(#shadow)"/>
  <text x="104" y="423" class="chartTitle">Worst-site Dice comparison — the average is not the only outcome</text>
  <text x="104" y="450" class="body">Direct labels; higher is better. FedAvg is the current engineering candidate, not a clinical winner.</text>
  <line x1="300" y1="500" x2="1210" y2="500" stroke="#d8e3eb"/>
  <line x1="300" y1="548" x2="1210" y2="548" stroke="#d8e3eb" stroke-dasharray="4 6"/>
  <line x1="300" y1="596" x2="1210" y2="596" stroke="#d8e3eb" stroke-dasharray="4 6"/>
  <text x="265" y="504" class="tick">0.08</text><text x="265" y="552" class="tick">0.04</text><text x="272" y="600" class="tick">0</text>
  <text x="105" y="507" class="barLabel">FedAvg</text><rect x="300" y="510" width="822" height="28" rx="8" fill="#16855b"/><text x="1136" y="531" class="barValue">0.072276</text>
  <text x="105" y="552" class="barLabel">FedProx</text><rect x="300" y="555" width="580" height="28" rx="8" fill="#3b82f6"/><text x="894" y="576" class="barValue">0.051055</text>
  <text x="105" y="597" class="barLabel">DP-SGD</text><rect x="300" y="600" width="429" height="28" rx="8" fill="#f59e0b"/><text x="743" y="621" class="barValue">0.037724</text>
  <text x="105" y="642" class="barLabel">Local</text><rect x="300" y="645" width="272" height="28" rx="8" fill="#64748b"/><text x="586" y="666" class="barValue">0.023893</text>
  <text x="805" y="642" class="barLabel">SVT</text><line x1="870" y1="659" x2="930" y2="659" stroke="#ef4444" stroke-width="5" stroke-linecap="round"/><text x="945" y="665" class="barValue">0.000000 · retained negative result</text>

  <rect x="70" y="692" width="1260" height="30" rx="10" fill="#e8f2f1"/>
  <text x="92" y="713" class="note">Claim boundary: synthetic MRI · three logical sites on one DGX Spark · engineering validation only · not clinical performance</text>
</svg>
